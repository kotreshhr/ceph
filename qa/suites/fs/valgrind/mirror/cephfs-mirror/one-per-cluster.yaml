meta:
- desc: run one cephfs-mirror daemon on primary cluster

tasks:
- cephfs-mirror:
    client: client.mirror
    # cephfs-mirror preforks: the child is the real daemon.  Teuthology's
    # get_valgrind_args() passes --trace-children=no first; these overrides
    # are appended after and take effect for the forked cephfs-mirror child.
    valgrind:
      - --tool=memcheck
      - --leak-check=full
      - --trace-children=yes
      - --child-silent-after-fork=no
      - --max-threads=1024
